<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Blue Current Rafting</title>
    <meta name="description" content="Contact us to plan your rafting experience. Our team is here to help you with any questions, reservations, or special details you may need.">
    <meta name="author" content="Pamela Michelle Beltran Trujillo">
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>
    <header>
        <img src="images/rapids.jpg" alt="Water Rafting Logo">
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="trips.html">Trips</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="hero">
            <h1>Blue Current Rafting</h1>
            <p>Los Lagos</p>
            <p>Los Rios, Chile</p>
            <p>+1 999 999 9999</p>
            <p>info@bluecurrent.com</p>
            
        </div>
        <section class="history"> 
            <div class="map">
                <iframe src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d50524.99343228829!2d-72.74325974859445!3d-39.854831718714514!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e0!3m2!1ses-419!2smx!4v1775336801227!5m2!1ses-419!2smx" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
            </div>

            <form class="box">
                <div class="quiz-item box">
                    <label for="q1">Name</label>
                    <input type="text" id="q1" name="q1" required>
                </div>
                <div class="quiz-item box">
                    <label for="q2">Email</label>
                    <input type="email" id="q2" name="q2" required>
                </div>
                <div class="quiz-item box">
                    <p>Message Purpose</p>
                    <input type="radio" id="inquiry" name="purpose" value="inquiry">
                    <label for="inquiry">General Inquiry</label><br>

                    <input type="radio" id="reservation" name="purpose" value="reservation">
                    <label for="reservation">Reservation Question</label><br>

                    <input type="radio" id="suggestion" name="purpose" value="suggestion">
                    <label for="suggestion">Website Suggestion</label>
                </div>
                <div class="quiz-item box">
                    <label for="q4">Message</label>
                    <textarea id="q4" name="q4"></textarea>
                </div>
                <div class="quiz-item box">
                    <label for="q5">Please Subscribe me to the monthyly newsletter</label>
                    <input type="checkbox" id="q5" name="q5">
                </div>
                <button type="submit"> Get in Touch!</button>
            </form>
        </section>

        <section class="adventures">
            <h2>We Are Here to Serve You</h2>
            <figure>
                <img src="images/person1.jpg" alt="Lara - Customer Service">
                <figcaption>Lara - Customer Service</figcaption>
            </figure>
            <figure>
                <img src="images/person2.jpg" alt="Jhon - Guide">
                <figcaption>Jhon - Guide</figcaption>
            </figure>
            <figure>
                <img src="images/person3.jpg" alt="Javier - Reservations">
                <figcaption>Javier - Reservations</figcaption>
            </figure>
        </section>
    </main>

    <footer> 
        <p>©2026 | Company Blue Current Rafting | Pamela Michelle Beltran Trujillo</p>
        <nav class="socialmedia">
            <a href="https://facebook.com">
                <img src="images/facebook.png" alt="Facebook Icon">
            </a>
            <a href="https://linkedin.com">
                <img src="images/linkedin.png" alt="LinkedIn Icon">
            </a>
            <a href="https://instagram.com">
                <img src="images/instagram.png" alt="Instagram Icon">
            </a>
        </nav>
    </footer>
</body>
</html>
