<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WDD 130 | HTML Form </title>
    <link rel="stylesheet" href="styles/poll-form.css">

</head>
<body>
    <header>WDD 130 | HTML Form - User Poll</header>
    <main>
        <form>
            <fieldset>
                <legend>Contact Information</legend>
                <label for="fullname">Full Name:</label>
                <input type="text" id="fullname" name="fullname" required>

                <label for="useremail">Email:</label>
                <input type="text" id="useremail" name="useremail" required>
            </fieldset>
            <fieldset>
                <legend>Question</legend>
                <label for="browser">What is your favorite browser?</label>
                <select id="browser" name="browser">
                    <option value="chorme">Chrome</option>
                    <option value="firebox">Firebox</option>
                    <option value="edge">Edge</option>
                    <option value="brave">Brave</option>
                    <option value="other">Other</option>
                </select>
            

                <label for="pet">Do you have a household pet?</label>
                <input type="checkbox" id="pet" name="pet">

                <label for="feedback">List the places you have lived:</label>    
                <textarea name="feedback" id="feedback" placeholder="United States, Mexico, Colombia"  rows="4"></textarea>      

            </fieldset>
            
            <button type="submit">Submit Poll</button>
        </form>
    </main>
    <footer>©2026 | HTML Form - User Poll Activity | Pamela Beltran</footer>
</body>
</html>
